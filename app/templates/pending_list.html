{% extends "base.html" %}
{% block title %}未完成单据 - 物料领取看板{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white py-3">
        <div class="row align-items-center">
            <div class="col-md-3">
                <h5 class="mb-0"><i class="fas fa-list me-2 text-warning"></i><span data-i18n="pending.title">未完成单据</span></h5>
            </div>
            <div class="col-md-9 mt-2 mt-md-0">
                <div class="row g-2">
                    <div class="col-4">
                        <input type="text" class="form-control form-control-sm" id="searchJobOrder"
                               placeholder="搜索工单号">
                    </div>
                    <div class="col-3">
                        <select class="form-select form-select-sm" id="statusFilter">
                            <option value="" data-i18n="admin.col_status">全部状态</option>
                            <option value="pending_prep" data-i18n="status.pending_prep">待备料</option>
                            <option value="prepping" data-i18n="status.prepping">备料中</option>
                            <option value="short" data-i18n="status.short">缺料</option>
                            <option value="ready_pickup" data-i18n="status.ready_pickup">待取料</option>
                        </select>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-primary btn-sm w-100" onclick="loadPending()">
                            <i class="fas fa-search me-1"></i><span data-i18n="common.search">查询</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        {% if session.user.role == 'admin' %}
                        <th><span data-i18n="admin.col_site">站点</span></th>
                        {% endif %}
                        <th><span data-i18n="form.job_order">工单号</span></th>
                        <th><span data-i18n="kanban.item_count">物料项数</span></th>
                        <th><span data-i18n="approve.requester">申请人</span></th>
                        <th><span data-i18n="admin.col_status">状态</span></th>
                        <th><span data-i18n="form.time">申请时间</span></th>
                        <th><span data-i18n="admin.col_actions">操作</span></th>
                    </tr>
                </thead>
                <tbody id="pendingTableBody">
                    <tr><td colspan="8" class="text-center text-muted" data-i18n="common.loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav id="pendingPagination" class="d-none">
            <ul class="pagination pagination-sm justify-content-center">
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let userRole = '{{ session.user.role }}';
document.addEventListener('DOMContentLoaded', function () {
    loadPending();
    document.getElementById('searchJobOrder').addEventListener('keyup', function (e) {
        if (e.key === 'Enter') loadPending();
    });
});
</script>
{% endblock %}
