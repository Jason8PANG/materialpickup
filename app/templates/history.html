{% extends "base.html" %}
{% block title %}历史查询 - 物料领取看板{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white py-3">
        <div class="row align-items-center">
            <div class="col-md-2">
                <h5 class="mb-0"><i class="fas fa-history me-2 text-info"></i>历史查询</h5>
            </div>
            <div class="col-md-10 mt-2 mt-md-0">
                <div class="row g-2">
                    <div class="col-2">
                        <input type="date" class="form-control form-control-sm" id="dateFrom">
                    </div>
                    <div class="col-2">
                        <input type="date" class="form-control form-control-sm" id="dateTo">
                    </div>
                    <div class="col-2">
                        <select class="form-select form-select-sm" id="statusFilter">
                            <option value="" data-i18n="admin.col_status">全部状态</option>
                            <option value="completed" data-i18n="history.completed">已完成</option>
                            <option value="rejected" data-i18n="history.rejected">已驳回</option>
                        </select>
                    </div>
                    <div class="col-2">
                        <input type="text" class="form-control form-control-sm" id="searchJobOrder"
                               placeholder="工单号">
                    </div>
                    <div class="col-2">
                        <button class="btn btn-primary btn-sm w-100" onclick="loadHistory()">
                            <i class="fas fa-search me-1"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        {% if session.user.role == 'admin' %}
                        <th><span data-i18n="admin.col_site">站点</span></th>
                        {% endif %}
                        <th><span data-i18n="form.job_order">工单号</span></th>
                        <th><span data-i18n="kanban.item_count">物料项数</span></th>
                        <th><span data-i18n="approve.requester">申请人</span></th>
                        <th><span data-i18n="admin.col_status">状态</span></th>
                        <th><span data-i18n="detail.supervisor">审批人</span></th>
                        <th><span data-i18n="form.time">申请时间</span></th>
                        <th><span data-i18n="admin.col_actions">操作</span></th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <tr><td colspan="9" class="text-center text-muted" data-i18n="common.loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav id="historyPagination" class="d-none">
            <ul class="pagination pagination-sm justify-content-center">
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let userRole = '{{ session.user.role }}';
document.addEventListener('DOMContentLoaded', function () {
    loadHistory();
    document.getElementById('searchJobOrder').addEventListener('keyup', function (e) {
        if (e.key === 'Enter') loadHistory();
    });
});
</script>
{% endblock %}
