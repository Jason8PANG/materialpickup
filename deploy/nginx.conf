# ============================================
# 物料领取看板系统 - Nginx 反向代理配置
# ============================================
# 使用前将 server_name 替换为实际域名或IP
# 配置文件应放置在 /etc/nginx/conf.d/material-kanban.conf

upstream material_kanban {
    server 127.0.0.1:5000;
    # 多实例负载均衡（可选）
    # server 127.0.0.1:5001;
    keepalive 64;
}

server {
    listen 80;
    server_name _;  # 替换为实际域名，如 kanban.example.com

    # 字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/material-kanban-access.log;
    error_log  /var/log/nginx/material-kanban-error.log;

    # 客户端上传大小限制（允许上传图片等）
    client_max_body_size 20m;

    # 静态文件直接由 Nginx 处理
    location /static/ {
        alias /home/app/material-kanban/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 所有动态请求转发到 Gunicorn
    location / {
        proxy_pass http://material_kanban;
        proxy_http_version 1.1;

        # 请求头转发
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留）
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size   4k;
        proxy_buffers       8 4k;
        proxy_busy_buffers_size 8k;
    }
}

